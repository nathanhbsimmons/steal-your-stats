    - generic [ref=e66]: Jerome John Garcia anchored the Grateful Dead for their entire thirty-year run. His fluid, lyrical guitar — indebted to bluegrass, modal jazz, and country — defined the band's sound and one of the most recognizable voices in rock improvisation. Every show, every set, every Dark Star was different. He died August 9, 1995.
