    - generic [ref=e66]: Ron "Pigpen" McKernan was a founding member and the original soul of the band. A blues devotee from childhood, his harmonica, organ, and above all his voice set the early Dead apart. His extended improvisational raps on Lovelight and Caution could stretch shows into the small hours. He died March 8, 1973 at 27.
